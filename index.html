<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SEMED CREI - Sistema de Educacao Inclusiva</title>
  <style>
    :root{--blue:#082f8f;--blue2:#123fb3;--green:#6ee000;--bg:#f4f7fb;--text:#17233c;--line:#d9e2f2;--muted:#66748a;--danger:#b91c1c;--ok:#21735f}
    *{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}.hidden{display:none!important}
    .login{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,#eef5ff,#fff)}
    .login-card{width:min(430px,100%);background:#fff;border:1px solid var(--line);border-radius:14px;padding:28px;box-shadow:0 18px 45px rgba(8,47,143,.14)}
    .login-card img{display:block;width:180px;margin:0 auto 18px}.login-card h1{text-align:center;color:var(--blue);margin:0 0 8px}.login-card p{text-align:center;color:var(--muted);margin:0 0 18px}.subtitle{display:block;text-align:center;color:var(--blue);font-size:13px;font-weight:800;margin:0 0 4px}
    .app{display:none;min-height:100vh;grid-template-columns:270px 1fr}.sidebar{background:#06215f;color:#eaf1ff;padding:18px 14px;display:flex;flex-direction:column;gap:16px}
    .brand{text-align:center;border-bottom:1px solid rgba(255,255,255,.16);padding-bottom:18px}.brand img{width:116px;background:#fff;border-radius:8px;padding:8px}.brand small{display:block;color:#bdd0ff;margin-top:4px}.brand .directorate{margin:10px auto 2px;color:#fff;font-size:13px;font-weight:800;line-height:1.25;max-width:210px}
    .nav{display:grid;gap:7px}.nav-title{font-weight:800;padding:16px 12px 6px}.nav button{width:100%;border:0;background:transparent;color:#eaf1ff;text-align:left;border-radius:8px;padding:11px 12px;display:flex;gap:10px;align-items:center;cursor:pointer}.nav button:hover,.nav button.active{background:rgba(255,255,255,.13)}
    .sidebar-footer{margin-top:auto;border-top:1px solid rgba(255,255,255,.16);padding-top:14px}.main{min-width:0;display:flex;flex-direction:column}.topbar{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 22px}.topbar h2{margin:0;color:var(--blue);font-size:20px}.status{margin-left:auto;font-size:12px;color:var(--muted)}
    .content{position:relative;flex:1;padding:22px;overflow:auto}.content:before{content:"";position:fixed;inset:64px 0 0 270px;pointer-events:none;background:url("assets/crei-logo.svg") center/min(58vw,720px) auto no-repeat;opacity:.055}.view{position:relative;z-index:1}
    .hero{min-height:calc(100vh - 108px);display:grid;place-items:center}.hero-card{width:min(900px,100%);background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:10px;padding:48px;text-align:center;box-shadow:0 18px 45px rgba(8,47,143,.12)}.hero-card h1{margin:0 0 10px;color:var(--blue);font-size:clamp(28px,4vw,44px)}
    .panel{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 8px 24px rgba(20,33,61,.06)}.panel-head{background:linear-gradient(90deg,var(--blue),var(--blue2));color:#fff;padding:16px 18px;display:flex;justify-content:space-between;align-items:center}.panel-head h3{margin:0}.panel-body{padding:18px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.col-2{grid-column:span 2}.col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-5{grid-column:span 5}.col-6{grid-column:span 6}.col-8{grid-column:span 8}.col-12{grid-column:span 12}
    .section-title{grid-column:1/-1;margin-top:6px;padding:10px 12px;background:#e8f0ff;color:var(--blue);border-left:4px solid var(--blue);border-radius:8px;font-weight:800}.form-group label{display:block;font-size:13px;font-weight:700;color:#4d5b74;margin-bottom:6px}.form-control{width:100%;min-height:44px;border:1px solid #cbd6ea;border-radius:8px;background:#fff;padding:10px 12px}.form-control:disabled{background:#eef2f7;color:#8490a3}textarea.form-control{min-height:96px}
    .btn{border:1px solid transparent;border-radius:8px;min-height:42px;padding:10px 14px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}.btn-primary{background:var(--blue);color:#fff}.btn-secondary{background:#fff;color:var(--blue);border-color:#b9c8e6}.btn-danger{background:var(--danger);color:#fff}.btn-ok{background:var(--ok);color:#fff}
    table{width:100%;border-collapse:collapse}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#f7faff;color:var(--blue);font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.tab{border:1px solid #b8c8e8;color:var(--blue);background:#eef4ff;border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}.tab.active{color:#fff;background:var(--blue)}.muted{color:var(--muted)}.alert{display:none;border:1px solid #fecaca;background:#fff1f2;color:var(--danger);border-radius:8px;padding:12px;margin-bottom:14px}.alert.show{display:block}.access-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:16px}.access-stat{background:#fff;border:1px solid var(--line);border-left:5px solid var(--blue);border-radius:10px;padding:16px;box-shadow:0 10px 26px rgba(8,47,143,.08)}.access-stat span{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase}.access-stat strong{display:block;color:var(--blue);font-size:28px;margin-top:5px}.access-table{overflow:auto;border:1px solid var(--line);border-radius:10px}.badge{display:inline-flex;align-items:center;justify-content:center;min-width:78px;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.badge-on{background:#dcfce7;color:#166534}.badge-off{background:#fee2e2;color:#991b1b}.permission-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:8px}.permission-option{display:flex;gap:9px;align-items:flex-start;border:1px solid var(--line);border-radius:8px;background:#f8fbff;padding:10px;font-weight:800;color:var(--text)}.permission-option input{width:16px;height:16px;margin-top:2px;flex:0 0 auto}.permission-option small{display:block;color:var(--muted);font-weight:600;margin-top:2px}
    @media(max-width:1000px){.app{grid-template-columns:1fr}.content:before{inset:64px 0 0 0}.sidebar{position:static}.col-2,.col-3,.col-4,.col-5,.col-6,.col-8{grid-column:span 6}}@media(max-width:680px){.content{padding:14px}.col-2,.col-3,.col-4,.col-5,.col-6,.col-8,.col-12{grid-column:span 12}.hero-card{padding:28px}.topbar{height:auto;min-height:64px;flex-wrap:wrap;padding:12px}}
  </style>
</head>
<body>
  <section id="loginScreen" class="login">
    <form id="loginForm" class="login-card">
      <img src="assets/crei-logo.svg" alt="SEMED CREI">
      <h1>SEMED CREI</h1>
      <span class="subtitle">Diretoria de Apoio a Educação Básica</span>
      <p>Sistema de Educacao Inclusiva</p>
      <div id="loginAlert" class="alert"></div>
      <div class="form-group"><label>E-mail</label><input id="loginEmail" class="form-control" type="email" value="admin@semed.local" required></div>
      <div class="form-group" style="margin-top:12px"><label>Senha</label><input id="loginPassword" class="form-control" type="password" value="Admin@123" required></div>
      <button class="btn btn-primary" style="width:100%;margin-top:18px">Entrar</button>
      <p class="muted" style="font-size:12px;margin-top:14px">Acesso inicial: admin@semed.local / Admin@123</p>
    </form>
  </section>

  <section id="appScreen" class="app">
    <aside class="sidebar">
      <div class="brand"><img src="assets/crei-logo.svg" alt="SEMED CREI"><div class="directorate">Diretoria de Apoio a Educação Básica</div><small>Sistema de Educacao Inclusiva</small></div>
      <nav id="menu" class="nav"></nav>
      <div class="sidebar-footer">
        <strong id="currentUserName">Admin Sistema</strong><br><small id="currentUserUnit">Administracao</small>
        <button class="btn btn-secondary" style="width:100%;margin-top:12px" onclick="logout()">Sair</button>
      </div>
    </aside>
    <main class="main">
      <header class="topbar"><button class="btn btn-secondary" onclick="showHome()">Voltar</button><h2 id="pageTitle">Visao Inicial</h2><span id="syncStatus" class="status">Firebase: aguardando</span></header>
      <div class="content"><div id="view" class="view"></div></div>
    </main>
  </section>

  <script src="firebase-config.js"></script>
  <script type="module" src="firebase-bridge.js"></script>
  <script>
    const cidBase=[['F84.0','Autismo infantil'],['F84.1','Autismo atipico'],['F84.5','Sindrome de Asperger'],['F81.0','Transtorno especifico de leitura'],['F81.1','Transtorno especifico da soletracao'],['F81.2','Transtorno especifico da habilidade em aritmetica'],['F90.0','Transtorno da atividade e da atencao'],['F70','Deficiencia intelectual leve'],['F71','Deficiencia intelectual moderada'],['H54','Cegueira e visao subnormal'],['H90','Perda de audicao por transtorno de conducao e/ou neurossensorial'],['G80','Paralisia cerebral'],['E34','Outros transtornos endocrinos'],['E40','Kwashiorkor'],['E41','Marasmo nutricional'],['E42','Kwashiorkor marasmatico'],['E43','Desnutricao proteico-calorica grave'],['E44','Desnutricao proteico-calorica moderada e leve']].map(([code,description])=>({code,description,active:true}));
    const standardProfiles=[{id:'admin',name:'Administrador'},{id:'semed',name:'SEMED'},{id:'diretoria-semed',name:'Diretoria SEMED'},{id:'crei',name:'CREI'},{id:'unidade',name:'Unidade de Ensino'},{id:'assessoria',name:'Assessoria'}];
    function normalizeProfiles(data){const current=data?.profiles||[],byId=Object.fromEntries(current.map(p=>[p.id,p]));data.profiles=standardProfiles.map(p=>({...p,...byId[p.id],id:p.id}));data.access=data.access||{};data.profiles.forEach(p=>data.access[p.id]=data.access[p.id]||{fields:{studentFields:p.id!=='admin'?true:undefined}});return data}
    const initialData=normalizeProfiles({users:[{id:'u-admin',name:'Admin Sistema',email:'admin@semed.local',password:'Admin@123',profileId:'admin',unitId:'admin',active:true}],profiles:standardProfiles,units:[{id:'admin',name:'Administracao SEMED',type:'Administracao',city:'Uberaba',active:true}],students:[],teachers:[],assignments:[],requests:[],pei:[],access:{admin:{fields:{studentFields:true,medicalFields:true,requests:true,supportTeachers:true,assignments:true,pei:true,reports:true,users:true,units:true}},unidade:{fields:{studentFields:true}}},cid10:cidBase});
    const Store={data:JSON.parse(JSON.stringify(initialData)),payload(){return JSON.parse(JSON.stringify(normalizeProfiles(this.data)))},merge(r){if(r&&typeof r==='object')this.data=normalizeProfiles({...initialData,...r,requests:r.requests||[],pei:r.pei||[],cid10:r.cid10?.length?r.cid10:cidBase})},async load(){const b=await window.CREI_FIREBASE_READY;if(!b?.enabled)throw new Error('Firebase indisponivel.');const r=await b.load();if(r){this.merge(r)}else{await b.save(this.payload())}q('syncStatus').textContent='Firebase: conectado'},async save(){const b=await window.CREI_FIREBASE_READY;if(!b?.enabled)throw new Error('Firebase indisponivel.');await b.save(this.payload());q('syncStatus').textContent='Firebase: salvo '+new Date().toLocaleTimeString('pt-BR')}};
    let currentUser=null,currentTab='dados',editingStudent=null,editingCrud={};
    const menu=[['students','Alunos',renderStudents],['requests','Solicitacoes',renderRequests,'Professor de Apoio'],['supportTeachers','Cadastro do Professor',renderTeachers,'Professor de Apoio'],['assignments','Vincular Professor',renderAssignments,'Professor de Apoio'],['pei','PEI',renderPei],['reports','Relatorio Gerencial',renderReports],['users','Usuarios',renderUsers,'Cadastros Operacionais'],['access','Painel de acesso',renderAccess,'Cadastros Operacionais'],['units','Cadastro de unidades',renderUnits,'Cadastros Operacionais']];
    const q=id=>document.getElementById(id),uid=p=>`${p}-${Date.now()}-${Math.random().toString(16).slice(2)}`,unitName=id=>Store.data.units.find(u=>u.id===id)?.name||'',studentName=id=>Store.data.students.find(s=>s.id===id)?.name||'',teacherName=id=>Store.data.teachers.find(t=>t.id===id)?.name||'',visibleStudents=()=>currentUser?.profileId==='unidade'?Store.data.students.filter(s=>s.unitId===currentUser.unitId):Store.data.students;
    function view(h){q('view').innerHTML=h}function setTitle(t){q('pageTitle').textContent=t}function selectMenu(k){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.key===k))}function showAlert(id,m){q(id).textContent=m;q(id).classList.add('show')}function clearAlert(id){q(id).classList.remove('show')}
    function buildMenu(){let h='',g='';menu.forEach(([k,l,fn,grp])=>{if(grp&&grp!==g){g=grp;h+=`<div class="nav-title">${grp}</div>`}if(!grp)g='';h+=`<button data-key="${k}" onclick="openView('${k}')">${l}</button>`});q('menu').innerHTML=h}
    function openView(k){const item=menu.find(m=>m[0]===k);if(!item)return;selectMenu(k);setTitle(item[1]);q('view').dataset.current=k;item[2]()}function renderCurrent(){const k=q('view').dataset.current||'home';k==='home'?showHome():openView(k)}function showHome(){selectMenu('');q('view').dataset.current='home';setTitle('Visao Inicial');view(`<section class="hero"><div class="hero-card"><h1>SEMED CREI</h1><p class="muted">Selecione uma opcao no menu principal para iniciar.</p></div></section>`)}function logout(){currentUser=null;q('appScreen').style.display='none';q('loginScreen').style.display='grid'}
    q('loginForm').addEventListener('submit',async e=>{e.preventDefault();clearAlert('loginAlert');try{await Store.load()}catch(err){console.warn(err);showAlert('loginAlert','Nao foi possivel conectar ao Firebase. Verifique a configuracao, autenticacao anonima e regras do Firestore.');return}const email=q('loginEmail').value.trim().toLowerCase(),pass=q('loginPassword').value;const user=Store.data.users.find(u=>u.email.toLowerCase()===email&&u.password===pass&&u.active);if(!user){showAlert('loginAlert','Login ou senha invalidos.');return}currentUser=user;q('currentUserName').textContent=user.name;q('currentUserUnit').textContent=unitName(user.unitId);q('loginScreen').style.display='none';q('appScreen').style.display='grid';buildMenu();showHome()});
    function optionSelected(v,o){return v===o||(v==='Nao'&&o==='Não')}
    function yesNo(id,v='',dis=false){return `<select id="${id}" class="form-control" ${dis?'disabled':''}><option value="">Selecione...</option><option ${v==='Sim'?'selected':''}>Sim</option><option value="Não" ${(v==='Não'||v==='Nao')?'selected':''}>Não</option></select>`}function opts(list,sel=''){return list.map(x=>`<option value="${x.id||x}" ${sel===(x.id||x)?'selected':''}>${x.name||x}</option>`).join('')}
    function renderStudents(){editingStudent=null;view(`<div class="toolbar"><button class="btn btn-primary" onclick="studentForm()">Novo aluno</button><strong>${visibleStudents().length} alunos</strong></div><div class="panel"><div class="panel-head"><h3>Alunos do CREI</h3></div><div class="panel-body">${tableStudents()}</div></div>`)}
    function tableStudents(){const rows=visibleStudents().map(s=>`<tr><td>${s.name}</td><td>${s.enrollment||''}</td><td>${s.grade||''}</td><td>${unitName(s.unitId)}</td><td>${s.hasReport||''}</td><td class="actions"><button class="btn btn-secondary" onclick="studentForm('${s.id}')">Editar</button><button class="btn btn-danger" onclick="deleteStudent('${s.id}')">Excluir</button></td></tr>`).join('');return `<table><thead><tr><th>Aluno</th><th>Matricula</th><th>Serie</th><th>Unidade</th><th>Laudo</th><th>Acoes</th></tr></thead><tbody>${rows||'<tr><td colspan="6" class="muted">Nenhum aluno cadastrado.</td></tr>'}</tbody></table>`}
    function studentForm(id=''){editingStudent=Store.data.students.find(s=>s.id===id)||{id:'',inclusion:{}};currentTab='dados';renderStudentForm()}
    function fieldInput(id,l,v='',col='col-4',type='text',extra=''){return `<div class="form-group ${col}"><label>${l}</label><input id="${id}" class="form-control inc-field" data-k="${id}" type="${type}" value="${v||''}" ${extra}></div>`}
    function selectInput(id,l,options,v='',col='col-4',extra=''){return `<div class="form-group ${col}"><label>${l}</label><select id="${id}" class="form-control inc-field" data-k="${id}" ${extra}><option value="">Selecione...</option>${options.map(o=>`<option value="${o}" ${optionSelected(v,o)?'selected':''}>${o}</option>`).join('')}</select></div>`}
    function yesNoField(id,l,v='',col='col-3',extra=''){return selectInput(id,l,['Sim','Não'],v,col,extra)}
    function fileInput(id,l,current='',col='col-4',extra=''){return `<div class="form-group ${col}"><label>${l}</label><input id="${id}" type="file" class="form-control" ${extra}><small>${current||''}</small></div>`}
    function renderStudentForm(){const s=editingStudent,inc=s.inclusion||{},tabs=['dados','deficiencia','alimentacao','comunicacao','higiene','motora','social','visual','auditivo','cognitivo','computo'],labels={dados:'Dados do aluno',deficiencia:'Deficiencia e/ou Transtornos',alimentacao:'Alimentacao',comunicacao:'Comunicacao',higiene:'Higiene',motora:'Funcao motora - locomocao',social:'Funcao social',visual:'Aspectos visuais',auditivo:'Aspectos auditivos - surdez/surdo cegueira',cognitivo:'Aspectos cognitivos',computo:'Computo'};view(`<div class="panel"><div class="panel-head"><h3>${s.id?'Editar':'Novo'} Aluno</h3><button class="btn btn-secondary" onclick="renderStudents()">Fechar</button></div><div class="panel-body"><div class="tabs">${tabs.map(t=>`<button class="tab ${currentTab===t?'active':''}" onclick="currentTab='${t}';renderStudentForm()">${labels[t]}</button>`).join('')}</div><form onsubmit="saveStudent(event)"><div class="grid">${studentTabHtml(s,inc)}</div><div class="toolbar" style="margin-top:18px"><button class="btn btn-secondary" type="button" onclick="renderStudents()">Cancelar</button><button class="btn btn-primary">Salvar</button></div></form></div></div>`);toggleStudentRules()}
    function studentTabHtml(s,inc){if(currentTab==='dados')return `<div class="section-title">Dados do aluno</div><div class="form-group col-4"><label>Unidade de Ensino *</label><select id="unitId" class="form-control" ${currentUser.profileId==='unidade'?'disabled':''}>${opts(Store.data.units.filter(u=>u.active),s.unitId||currentUser.unitId)}</select></div><div class="form-group col-4"><label>Nome do Aluno *</label><input id="name" class="form-control" value="${s.name||''}" required></div><div class="form-group col-2"><label>Matricula</label><input id="enrollment" class="form-control" value="${s.enrollment||''}"></div><div class="form-group col-1"><label>Serie</label><input id="grade" class="form-control" value="${s.grade||''}"></div><div class="form-group col-1"><label>Turma</label><input id="classGroup" class="form-control" value="${s.classGroup||''}"></div><div class="form-group col-3"><label>Data de Nascimento</label><input id="birthDate" type="date" class="form-control" value="${s.birthDate||''}"></div><div class="form-group col-6"><label>Nome do(a) Professor(a) da classe regular</label><input id="regularTeacher" class="form-control" value="${s.regularTeacher||''}"></div><div class="form-group col-3"><label>Frequenta AEE?</label>${yesNo('attendsAee',s.attendsAee)}</div>`;
      if(currentTab==='deficiencia')return `<div class="section-title">Deficiencia e/ou Transtornos</div>${selectInput('disabilityType','Deficiencia e/ou Transtornos',['Deficiencia Auditiva - Perda Auditiva','Deficiencia Auditiva - Surdez','Deficiencia Visual - Baixa Visao','Deficiencia Visual - Cegueira','Deficiencia Fisica','Deficiencia Intelectual','Deficiencia Multipla','Transtorno do Espectro Autista - TEA','Outro'],inc.disabilityType,'col-6')}${yesNoField('hasReport','Laudo Medico?',s.hasReport,'col-3','onchange="toggleStudentRules()"')}${fileInput('reportFile','Anexar Laudo',s.reportFileName,'col-3','accept="application/pdf"')}${yesNoField('otherConditionReport','Laudo medico atesta outro transtorno/condicao/comorbidade?',inc.otherConditionReport,'col-6')}${yesNoField('familyInterview','AEE realizou entrevista com a familia?',inc.familyInterview,'col-3','onchange="toggleStudentRules()"')}${fileInput('interviewFile','Anexar entrevista',inc.interviewFileName,'col-3')}`;
      if(currentTab==='alimentacao')return `<div class="section-title">Alimentacao</div>${yesNoField('foodAutonomy','Tem autonomia para se alimentar?',inc.foodAutonomy)}${yesNoField('foodNeedsHelp','Necessita de auxilio para se alimentar?',inc.foodNeedsHelp)}${yesNoField('tubeFeeding','Alimentacao por sonda?',inc.tubeFeeding)}${yesNoField('foodSelectivity','Seletividade alimentar?',inc.foodSelectivity,'col-3','onchange="toggleStudentRules()"')}${fieldInput('foodSelectivityText','Qual seletividade?',inc.foodSelectivityText,'col-6')}`;
      if(currentTab==='comunicacao')return `<div class="section-title">Comunicacao</div>${selectInput('verbalLanguage','Expressa por meio de linguagem verbal?',['Balbucia','Palavras','Frases','Mantem dialogo','Nao verbal'],inc.verbalLanguage,'col-4')}${yesNoField('alternativeCommunication','Usa de comunicacao alternativa e suplementar?',inc.alternativeCommunication)}${yesNoField('pointingCommunication','Se expressa por apontamento?',inc.pointingCommunication)}${yesNoField('simpleCommands','Responde comandos simples?',inc.simpleCommands)}${yesNoField('understandableCommunication','Se comunica de forma compreensivel?',inc.understandableCommunication)}${yesNoField('linguisticSupport','Necessita de apoio/suporte linguistico?',inc.linguisticSupport)}`;
      if(currentTab==='higiene')return `<div class="section-title">Higiene</div>${yesNoField('bathroomAlone','Usa banheiro sozinho(a)?',inc.bathroomAlone)}${yesNoField('usesDiaper','Usa fralda?',inc.usesDiaper)}${yesNoField('physiologicalSigns','Identifica sinais fisiologicos?',inc.physiologicalSigns)}${yesNoField('sphincterControl','Controle de esfincteres?',inc.sphincterControl)}${yesNoField('personalCareAutonomy','Autonomia nos cuidados pessoais?',inc.personalCareAutonomy)}`;

      if(currentTab==='social')return `<div class="section-title">Funcao social</div>${yesNoField('acceptsRules','Aceita regras?',inc.acceptsRules)}${yesNoField('routineDifficulty','Dificuldade em seguir rotinas?',inc.routineDifficulty)}${yesNoField('transitionCrises','Transicao entre atividades geram crises?',inc.transitionCrises,'col-4')}${yesNoField('socialInteractionDifficulty','Dificuldade na interacao social?',inc.socialInteractionDifficulty,'col-4')}${yesNoField('selfRegulationDifficulty','Dificuldade de autoregulacao?',inc.selfRegulationDifficulty,'col-4')}${yesNoField('atypicalBehavior','Comportamento atipico?',inc.atypicalBehavior)}${yesNoField('riskToSelfOthers','Oferece risco a si e outros?',inc.riskToSelfOthers)}${selectInput('crisisDemonstrations','Apresenta demonstracoes de crises?',['Sim','Nao','Ansiedade','Emocionais','Sensoriais'],inc.crisisDemonstrations,'col-3')}`;
      if(currentTab==='visual')return `<div class="section-title">Aspectos visuais</div>${yesNoField('usesGlasses','Uso de oculos?',inc.usesGlasses)}${yesNoField('opticalResources','Necessita de recursos opticos?',inc.opticalResources)}${yesNoField('nonOpticalResources','Necessita recursos nao opticos?',inc.nonOpticalResources)}${yesNoField('lightSensitivity','Sensibilidade a alta iluminacao?',inc.lightSensitivity)}${yesNoField('caneMobility','Uso de bengala para mobilidade/locomocao?',inc.caneMobility,'col-4')}${yesNoField('brailleAudiovisual','Utiliza braile e/ou recursos audiovisuais?',inc.brailleAudiovisual,'col-4')}${selectInput('visualCondition','Apresenta alguma dessas condicoes?',['Daltonismo','Discromatopia','Nao apresenta'],inc.visualCondition,'col-4')}`;
      if(currentTab==='auditivo')return `<div class="section-title">Aspectos auditivos - surdez/surdo cegueira</div>${yesNoField('usesLibras','Utiliza LIBRAS?',inc.usesLibras)}${yesNoField('respondsSounds','Responde a sons e chamados?',inc.respondsSounds)}${yesNoField('hearingAid','Aparelho auditivo?',inc.hearingAid)}${yesNoField('hearingLossAfterLanguage','Perda auditiva apos aquisicao da linguagem?',inc.hearingLossAfterLanguage,'col-4')}${yesNoField('visualLossAuditoryResidue','Perda visual com residuo auditivo?',inc.visualLossAuditoryResidue,'col-4')}${yesNoField('hearingLossVisualResidue','Perda auditiva com residuo visual?',inc.hearingLossVisualResidue,'col-4')}`;

    function toggleStudentRules(){const has=q('hasReport')?.value==='Sim';if(q('reportFile'))q('reportFile').disabled=!has;const interview=q('familyInterview')?.value==='Sim';if(q('interviewFile'))q('interviewFile').disabled=!interview;const selective=q('foodSelectivity')?.value==='Sim';if(q('foodSelectivityText'))q('foodSelectivityText').disabled=!selective}
    function showCid(id){const input=q(id),out=q(id+'Text');if(!input||!out)return;const c=Store.data.cid10.find(x=>x.code.toUpperCase()===input.value.trim().toUpperCase());out.textContent=c?`${c.code} - ${c.description}`:(input.value?'CID10 nao localizado.':'Digite o codigo para localizar o CID10.')}
    async function saveStudent(e){e.preventDefault();const val=(f,d='')=>q(f)?.value??d,id=editingStudent.id||uid('stu'),unitId=currentUser.profileId==='unidade'?currentUser.unitId:val('unitId',editingStudent.unitId||currentUser.unitId),inc=editingStudent.inclusion||{};document.querySelectorAll('.inc-field').forEach(el=>inc[el.dataset.k]=el.value);if(q('interviewFile')?.files?.[0])inc.interviewFileName=q('interviewFile').files[0].name;const s={id,unitId,name:val('name',editingStudent.name||''),enrollment:val('enrollment',editingStudent.enrollment||''),grade:val('grade',editingStudent.grade||''),classGroup:val('classGroup',editingStudent.classGroup||''),birthDate:val('birthDate',editingStudent.birthDate||''),regularTeacher:val('regularTeacher',editingStudent.regularTeacher||''),attendsAee:val('attendsAee',editingStudent.attendsAee||''),hasReport:val('hasReport',editingStudent.hasReport||''),reportFileName:q('reportFile')?.files?.[0]?.name||editingStudent.reportFileName||'',inclusion:inc};const i=Store.data.students.findIndex(x=>x.id===id);i>=0?Store.data.students[i]=s:Store.data.students.push(s);await Store.save().catch(e=>alert(e.message));renderStudents()}
    async function deleteStudent(id){if(confirm('Excluir aluno?')){Store.data.students=Store.data.students.filter(s=>s.id!==id);await Store.save().catch(e=>alert(e.message));renderStudents()}}
    function fieldHtml(f,l,item={}){const value=item[f]||'';if(f==='unitId')return `<div class="form-group col-4"><label>${l}</label><select class="form-control" id="${f}">${opts(Store.data.units.filter(u=>u.active),value)}</select></div>`;if(f==='profileId')return `<div class="form-group col-4"><label>${l}</label><select class="form-control" id="${f}">${opts(Store.data.profiles,value)}</select></div>`;return `<div class="form-group col-4"><label>${l}</label><input class="form-control" id="${f}" value="${value}" ${f==='password'?'type="password"':''} required></div>`}
    function crud(title,key,fields,labels){const editId=editingCrud[key]||'',item=(Store.data[key]||[]).find(x=>x.id===editId)||{};view(`<div class="panel"><div class="panel-head"><h3>${editId?'Editar':'Novo'} ${title}</h3>${editId?'<button class="btn btn-secondary" onclick="clearCrudEdit()">Cancelar edicao</button>':''}</div><div class="panel-body"><form class="grid" onsubmit="saveCrud(event,'${key}')">${fields.map((f,i)=>fieldHtml(f,labels[i],item)).join('')}<div class="col-12"><button class="btn btn-primary">${editId?'Atualizar':'Salvar'}</button></div></form><hr>${tableCrud(key,fields,labels)}</div></div>`)}
    function tableCrud(key,fields,labels){const rows=(Store.data[key]||[]).map(x=>`<tr>${fields.slice(0,3).map(f=>`<td>${f==='unitId'?unitName(x[f]):f==='profileId'?(Store.data.profiles.find(p=>p.id===x[f])?.name||x[f]||''):x[f]||''}</td>`).join('')}<td class="actions"><button class="btn btn-secondary" onclick="editCrud('${key}','${x.id}')">Editar</button><button class="btn btn-danger" onclick="deleteCrud('${key}','${x.id}')">Excluir</button></td></tr>`).join('');return `<table><thead><tr>${labels.slice(0,3).map(l=>`<th>${l}</th>`).join('')}<th>Acoes</th></tr></thead><tbody>${rows||'<tr><td colspan="4" class="muted">Nenhum registro.</td></tr>'}</tbody></table>`}
    function editCrud(key,id){editingCrud[key]=id;renderCurrent()}function clearCrudEdit(){editingCrud={};renderCurrent()}
    async function saveCrud(e,key){e.preventDefault();const editId=editingCrud[key]||'',item={id:editId||uid(key),active:true};e.target.querySelectorAll('[id]').forEach(el=>item[el.id]=el.value);const i=Store.data[key].findIndex(x=>x.id===item.id);if(i>=0)Store.data[key][i]={...Store.data[key][i],...item};else Store.data[key].push(item);editingCrud[key]='';await Store.save().catch(err=>alert(err.message));renderCurrent()}async function deleteCrud(key,id){Store.data[key]=Store.data[key].filter(x=>x.id!==id);if(editingCrud[key]===id)editingCrud[key]='';await Store.save().catch(err=>alert(err.message));renderCurrent()}
    function renderUnits(){crud('Cadastro de unidades','units',['name','type','city'],['Nome','Tipo','Cidade'])}function renderUsers(){crud('Usuarios','users',['name','email','profileId','unitId','password'],['Nome','E-mail','Perfil','Unidade/Orgao','Senha'])}function renderTeachers(){crud('Cadastro do Professor','teachers',['name','document','email','phone','unitId'],['Nome','Documento','E-mail','Telefone','Unidade'])}
    function renderAssignments(){const count=tid=>Store.data.assignments.filter(a=>a.teacherId===tid&&a.active).length;view(`<div class="panel"><div class="panel-head"><h3>Vincular Professor ao Aluno</h3></div><div class="panel-body"><form class="grid" onsubmit="saveAssignment(event)"><div class="form-group col-5"><label>Professor</label><select id="teacherId" class="form-control">${Store.data.teachers.map(t=>`<option value="${t.id}" ${count(t.id)>=2?'disabled':''}>${t.name} (${count(t.id)}/2)</option>`).join('')}</select></div><div class="form-group col-5"><label>Aluno</label><select id="studentId" class="form-control">${visibleStudents().map(s=>`<option value="${s.id}">${s.name} - ${unitName(s.unitId)}</option>`).join('')}</select></div><div class="col-2"><label>&nbsp;</label><button class="btn btn-primary" style="width:100%">Vincular</button></div></form><hr>${tableAssignments()}</div></div>`)}
    async function saveAssignment(e){e.preventDefault();const teacherId=q('teacherId').value,studentId=q('studentId').value;if(!teacherId||!studentId)return alert('Cadastre professor e aluno antes de vincular.');if(Store.data.assignments.filter(a=>a.teacherId===teacherId&&a.active).length>=2)return alert('Professor ja vinculado ao limite de 2 alunos.');const stu=Store.data.students.find(s=>s.id===studentId);Store.data.assignments.push({id:uid('ass'),teacherId,studentId,unitId:stu?.unitId,active:true});await Store.save().catch(err=>alert(err.message));renderAssignments()}function tableAssignments(){const rows=Store.data.assignments.map(a=>`<tr><td>${teacherName(a.teacherId)}</td><td>${studentName(a.studentId)}</td><td>${unitName(a.unitId)}</td><td><button class="btn btn-danger" onclick="deleteCrud('assignments','${a.id}')">Excluir</button></td></tr>`).join('');return `<table><thead><tr><th>Professor</th><th>Aluno</th><th>Unidade</th><th>Acoes</th></tr></thead><tbody>${rows||'<tr><td colspan="4" class="muted">Nenhum vinculo.</td></tr>'}</tbody></table>`}
    const accessModules=[['studentFields','Cadastro de alunos','Dados pessoais, escolares e listagem de alunos'],['medicalFields','Informacoes medicas','Laudo, CID, medicacao e anexos'],['requests','Solicitacoes','Solicitacoes de professor de apoio'],['supportTeachers','Cadastro do professor','Cadastro e consulta dos professores de apoio'],['assignments','Vinculos','Vincular professor ao aluno'],['pei','PEI','Plano Educacional Individualizado'],['reports','Relatorios','Indicadores e relatorio gerencial'],['users','Usuarios','Cadastro de usuarios e perfis'],['units','Unidades','Cadastro de unidades de ensino']];
    function accessFields(profileId){const defaults=Object.fromEntries(accessModules.map(([k])=>[k,profileId==='admin']));if(profileId!=='admin')defaults.studentFields=true;const current=Store.data.access?.[profileId]?.fields||{};return {...defaults,...current}}
    function renderAccess(){const rows=Store.data.profiles.map(p=>{const fields=accessFields(p.id),enabled=accessModules.filter(([k])=>fields[k]).length,total=accessModules.length;return `<tr><td><strong>${p.name}</strong><br><span class="muted">${p.id}</span></td><td>${enabled}/${total} modulos liberados</td><td>${enabled===total?'<span class="badge badge-on">Completo</span>':enabled?'<span class="badge badge-on">Parcial</span>':'<span class="badge badge-off">Bloqueado</span>'}</td><td class="actions"><button class="btn btn-secondary" onclick="accessForm('${p.id}')">Editar</button></td></tr>`}).join('');const totalProfiles=Store.data.profiles.length,totalModules=Store.data.profiles.reduce((sum,p)=>sum+accessModules.filter(([k])=>accessFields(p.id)[k]).length,0),maxModules=totalProfiles*accessModules.length;view(`<div class="access-summary"><div class="access-stat"><span>Perfis avaliados</span><strong>${totalProfiles}</strong></div><div class="access-stat"><span>Permissoes liberadas</span><strong>${totalModules}</strong></div><div class="access-stat"><span>Cobertura</span><strong>${maxModules?Math.round(totalModules/maxModules*100):0}%</strong></div></div><div class="panel"><div class="panel-head"><h3>Painel de acesso</h3><span>${new Date().toLocaleDateString('pt-BR')}</span></div><div class="panel-body"><div class="toolbar"><div><strong>Perfis e permissoes</strong><p class="muted" style="margin:4px 0 0">Verifique rapidamente o que cada perfil pode acessar e use Editar para ajustar.</p></div></div><div class="access-table"><table><thead><tr><th>Perfil</th><th>Resumo</th><th>Status</th><th>Acoes</th></tr></thead><tbody>${rows||'<tr><td colspan="4" class="muted">Nenhum perfil cadastrado.</td></tr>'}</tbody></table></div></div></div>`)}
    function accessForm(profileId){const profile=Store.data.profiles.find(p=>p.id===profileId);if(!profile)return renderAccess();const fields=accessFields(profileId),users=Store.data.users.filter(u=>u.profileId===profileId);view(`<div class="panel"><div class="panel-head"><h3>Editar acesso - ${profile.name}</h3><button class="btn btn-secondary" onclick="renderAccess()">Voltar</button></div><div class="panel-body"><form onsubmit="saveAccess(event,'${profileId}')"><p class="muted">Confira as informacoes do perfil do usuario e ajuste as permissoes quando necessario.</p><div class="section-title">Dados do perfil</div><div class="grid"><div class="form-group col-4"><label>Perfil do usuario</label><select id="accessProfileId" class="form-control" disabled>${standardProfiles.map(p=>`<option value="${p.id}" ${p.id===profileId?'selected':''}>${p.name}</option>`).join('')}</select></div><div class="form-group col-4"><label>Nome exibido</label><input id="accessProfileName" class="form-control" value="${profile.name||''}" required></div><div class="form-group col-4"><label>Codigo do perfil</label><input class="form-control" value="${profile.id}" disabled></div></div><div class="section-title">Usuarios vinculados</div><div class="access-table"><table><thead><tr><th>Usuario</th><th>E-mail</th><th>Unidade</th><th>Status</th></tr></thead><tbody>${users.map(u=>`<tr><td>${u.name||''}</td><td>${u.email||''}</td><td>${unitName(u.unitId)}</td><td>${u.active?'<span class="badge badge-on">Ativo</span>':'<span class="badge badge-off">Inativo</span>'}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">Nenhum usuario vinculado a este perfil.</td></tr>'}</tbody></table></div><div class="section-title">Permissoes de acesso</div><p class="muted">Marque os modulos liberados para este perfil. Esta tela segue o modelo de verificacao do sistema SEMED de inscricoes.</p><div class="permission-grid">${accessModules.map(([key,label,desc])=>`<label class="permission-option"><input type="checkbox" name="${key}" ${fields[key]?'checked':''}><span>${label}<small>${desc}</small></span></label>`).join('')}</div><div class="toolbar" style="margin-top:18px"><button class="btn btn-secondary" type="button" onclick="renderAccess()">Cancelar</button><button class="btn btn-primary">Salvar alteracoes</button></div></form></div></div>`)}
    async function saveAccess(e,profileId){e.preventDefault();const fields={};accessModules.forEach(([key])=>fields[key]=Boolean(e.target.elements[key]?.checked));const profile=Store.data.profiles.find(p=>p.id===profileId);if(profile)profile.name=q('accessProfileName')?.value.trim()||profile.name;Store.data.access=Store.data.access||{};Store.data.access[profileId]={fields};await Store.save().catch(err=>alert(err.message));renderAccess()}
    function renderReports(){view(`<div class="grid"><div class="panel col-3"><div class="panel-body"><h3>${visibleStudents().length}</h3><p>Alunos cadastrados</p></div></div><div class="panel col-3"><div class="panel-body"><h3>${Store.data.teachers.length}</h3><p>Professores de apoio</p></div></div><div class="panel col-3"><div class="panel-body"><h3>${Store.data.assignments.length}</h3><p>Vinculos ativos</p></div></div><div class="panel col-3"><div class="panel-body"><h3>${Store.data.requests.length}</h3><p>Solicitacoes</p></div></div></div>`)}
    function renderRequests(){view(`<div class="panel"><div class="panel-head"><h3>Solicitacoes de Professor de Apoio</h3></div><div class="panel-body"><form class="grid" onsubmit="saveRequest(event)"><div class="form-group col-4"><label>Aluno</label><select id="requestStudentId" class="form-control" required>${visibleStudents().map(s=>`<option value="${s.id}">${s.name} - ${unitName(s.unitId)}</option>`).join('')}</select></div><div class="form-group col-2"><label>Prioridade</label><select id="requestPriority" class="form-control"><option>Normal</option><option>Alta</option><option>Urgente</option></select></div><div class="form-group col-2"><label>Status</label><select id="requestStatus" class="form-control"><option>Aberta</option><option>Em analise</option><option>Deferida</option><option>Indeferida</option></select></div><div class="form-group col-4"><label>Observacoes</label><input id="requestObs" class="form-control"></div><div class="col-12"><button class="btn btn-primary">Registrar solicitacao</button></div></form><hr>${tableRequests()}</div></div>`)}
    function tableRequests(){const rows=Store.data.requests.map(r=>`<tr><td>${studentName(r.studentId)}</td><td>${unitName(r.unitId)}</td><td>${r.priority}</td><td>${r.status}</td><td>${r.observations||''}</td><td><button class="btn btn-danger" onclick="deleteCrud('requests','${r.id}')">Excluir</button></td></tr>`).join('');return `<table><thead><tr><th>Aluno</th><th>Unidade</th><th>Prioridade</th><th>Status</th><th>Observacoes</th><th>Acoes</th></tr></thead><tbody>${rows||'<tr><td colspan="6" class="muted">Nenhuma solicitacao registrada.</td></tr>'}</tbody></table>`}
    async function saveRequest(e){e.preventDefault();const studentId=q('requestStudentId').value;if(!studentId)return alert('Cadastre um aluno antes de registrar solicitacao.');const stu=Store.data.students.find(s=>s.id===studentId);Store.data.requests.push({id:uid('req'),studentId,unitId:stu?.unitId||'',priority:q('requestPriority').value,status:q('requestStatus').value,observations:q('requestObs').value,createdAt:new Date().toISOString()});await Store.save().catch(err=>alert(err.message));renderRequests()}
    function renderPei(){view(`<div class="panel"><div class="panel-head"><h3>Plano Educacional Individualizado</h3></div><div class="panel-body"><form class="grid" onsubmit="savePei(event)"><div class="form-group col-4"><label>Aluno</label><select id="peiStudentId" class="form-control" required>${visibleStudents().map(s=>`<option value="${s.id}">${s.name} - ${unitName(s.unitId)}</option>`).join('')}</select></div><div class="form-group col-8"><label>Objetivos</label><input id="peiGoals" class="form-control"></div><div class="form-group col-6"><label>Intervencoes</label><textarea id="peiInterventions" class="form-control"></textarea></div><div class="form-group col-6"><label>Avaliacao</label><textarea id="peiEvaluation" class="form-control"></textarea></div><div class="col-12"><button class="btn btn-primary">Salvar PEI</button></div></form><hr>${tablePei()}</div></div>`)}
    function tablePei(){const rows=Store.data.pei.map(p=>`<tr><td>${studentName(p.studentId)}</td><td>${unitName(p.unitId)}</td><td>${p.goals||''}</td><td>${p.updatedAt?new Date(p.updatedAt).toLocaleDateString('pt-BR'):''}</td><td><button class="btn btn-danger" onclick="deleteCrud('pei','${p.id}')">Excluir</button></td></tr>`).join('');return `<table><thead><tr><th>Aluno</th><th>Unidade</th><th>Objetivos</th><th>Atualizado em</th><th>Acoes</th></tr></thead><tbody>${rows||'<tr><td colspan="5" class="muted">Nenhum PEI cadastrado.</td></tr>'}</tbody></table>`}
    async function savePei(e){e.preventDefault();const studentId=q('peiStudentId').value;if(!studentId)return alert('Cadastre um aluno antes de salvar PEI.');const stu=Store.data.students.find(s=>s.id===studentId);Store.data.pei.push({id:uid('pei'),studentId,unitId:stu?.unitId||'',goals:q('peiGoals').value,interventions:q('peiInterventions').value,evaluation:q('peiEvaluation').value,updatedAt:new Date().toISOString()});await Store.save().catch(err=>alert(err.message));renderPei()}
